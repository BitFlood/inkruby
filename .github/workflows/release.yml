name: Release

on:
  push:
    tags:
      - '*'   # 推送任意标签（如 1.0.1）触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 创建 Release
      id-token: write          # 用于生成 attestation
      attestations: write      # 上传 attestation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 安装 esbuild（轻量打包工具）
      - name: Install esbuild
        run: npm install -g esbuild

      # 打包所有 TypeScript 文件为单个 main.js
      - name: Bundle plugin
        run: esbuild main.ts --bundle --outfile=main.js --platform=node --external=obsidian

      # 确保 styles.css 在根目录（如果已在根目录，这步无害）
      - name: Copy stylesheet
        run: cp styles.css . || true

      # 为三个文件生成来源证明
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      # 创建 GitHub Release，名称直接使用标签名（如 1.0.1）
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "${{ github.ref_name }}"
          files: |
            main.js
            styles.css
            manifest.json